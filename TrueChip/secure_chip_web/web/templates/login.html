{% extends "base.html" %}
{% block title %}Đăng nhập{% endblock %}
{% block content %}

<section class="panel-auth">
  <p class="eyebrow">NHÀ SẢN XUẤT</p>
  <h1 class="panel-title">Đăng nhập</h1>
  <p class="panel-sub">Truy cập dashboard để đăng ký và quản lý chip của bạn.</p>

  <form method="post" class="auth-form">
    <label for="username">Tên đăng nhập</label>
    <input type="text" id="username" name="username" autocomplete="username" required>

    <label for="password">Mật khẩu</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>

    <button type="submit" class="btn btn-primary btn-lg btn-block">Đăng nhập</button>
  </form>

  <p class="auth-switch">Chưa có tài khoản? <a href="{{ url_for('register') }}">Tạo tài khoản nhà sản xuất</a></p>
</section>

{% endblock %}
