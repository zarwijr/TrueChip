{% extends "base.html" %}
{% block title %}Tạo tài khoản{% endblock %}
{% block content %}

<section class="panel-auth">
  <p class="eyebrow">NHÀ SẢN XUẤT</p>
  <h1 class="panel-title">Tạo tài khoản</h1>
  <p class="panel-sub">Dùng tài khoản này để đăng ký chip thật và quản lý thông tin sản phẩm.</p>

  <form method="post" class="auth-form">
    <label for="display_name">Tên nhà sản xuất / thương hiệu</label>
    <input type="text" id="display_name" name="display_name" required>

    <label for="username">Tên đăng nhập</label>
    <input type="text" id="username" name="username" autocomplete="username" required>

    <label for="password">Mật khẩu (tối thiểu 8 ký tự)</label>
    <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>

    <label for="confirm">Xác nhận mật khẩu</label>
    <input type="password" id="confirm" name="confirm" autocomplete="new-password" minlength="8" required>

    <button type="submit" class="btn btn-primary btn-lg btn-block">Tạo tài khoản</button>
  </form>

  <p class="auth-switch">Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></p>
</section>

{% endblock %}
